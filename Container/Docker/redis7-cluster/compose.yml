# Redis Cluster
# 3 主 3 从
#
# 启动
# docker compose up -d
# 查看集群信息
# docker exec -it redis7-cluster-redis-1-1 redis-cli -p 7001 cluster info
# docker exec -it redis7-cluster-redis-1-1 redis-cli -p 7001 cluster nodes
# 连接集群
# docker exec -it redis7-cluster-redis-1-1 redis-cli -c -p 7001
#
# host 网络模式, 所有节点共享宿主机网络栈
# 每个节点占用两个端口:
#   - 客户端端口: 7001, 7002, 7003...
#   - 集群总线端口: 客户端端口 + 10000 (即 17001, 17002, 17003...)

services:
  cluster-creator:
    image: redis:7
    network_mode: host
    command:
      - sh
      - -c
      - redis-cli
        --cluster create
        localhost:7001 localhost:7002 localhost:7003
        localhost:7004 localhost:7005 localhost:7006
        --cluster-replicas 1
        --cluster-yes
    depends_on: [
      redis-1, redis-2, redis-3,
      redis-4, redis-5, redis-6
    ]

  redis-1:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7001:/data"
    command: redis-server /etc/redis.conf --port 7001

  redis-2:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7002:/data"
    command: redis-server /etc/redis.conf --port 7002

  redis-3:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7003:/data"
    command: redis-server /etc/redis.conf --port 7003

  redis-4:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7004:/data"
    command: redis-server /etc/redis.conf --port 7004

  redis-5:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7005:/data"
    command: redis-server /etc/redis.conf --port 7005

  redis-6:
    image: redis:7
    network_mode: host
    volumes:
      - "./redis.conf:/etc/redis.conf"
      - "~/data-container/docker/redis7-cluster/data-7006:/data"
    command: redis-server /etc/redis.conf --port 7006
