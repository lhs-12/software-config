[tools]
aube      = "latest" # aube自动代替npm作为包管理器, 用 mise use -g 代替 npm install -g
usage     = "latest"
pitchfork = "latest"

pi       = "latest"
claude   = "latest"
codex    = "latest"
opencode = "latest"
"npm:skills" = "latest"

java   = "25"
maven  = "3"
rust   = "stable"
node   = "lts"
uv     = "latest"
ruff   = "latest"
stylua = "latest"
oxfmt  = "latest"
oxlint = "latest"

[settings]
minimum_release_age = "24h" # s=秒 m=分 h=时 d=天 w=周 mo=月 y=年, "0s"禁用
minimum_release_age_excludes = ["pi", "claude", "codex", "opencode"]
idiomatic_version_file_enable_tools = ["java", "node", "pnpm", "rust"]
