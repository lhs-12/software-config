[tools]
aube      = "latest" # aube自动代替npm作为包管理器, 用 mise use -g 代替 npm install -g
usage     = "latest"
pitchfork = "latest"
gh        = "latest"

pi = "latest"
"npm:skills" = "latest"
"github:can1357/oh-my-pi" = "latest"

rust = "stable"
cargo-binstall = "latest"

java   = "25"
maven  = "3"
node   = "lts"
uv     = "latest"
ruff   = "latest"
stylua = "latest"
oxfmt  = "latest"
oxlint = "latest"

[tools."npm:snow-ai"]
version = "latest"
allow_builds = ["snow-ai", "sharp", "ssh2", "cpu-features"] # 放行依赖 build script (aube 默认拒绝执行)
install_env = { SHARP_IGNORE_GLOBAL_LIBVIPS = "true" } # sharp 用自带 prebuilt, 忽略系统全局 libvips(源码编译缺 node-addon-api 失败)

[settings]
github.use_git_credentials = true # 使用 Git 作为 Github 凭证助手, 配合 gh 登录使用
minimum_release_age = "24h" # s=秒 m=分 h=时 d=天 w=周 mo=月 y=年, "0s"禁用
minimum_release_age_excludes = ["pi", "github:can1357/oh-my-pi", "npm:snow-ai"]
idiomatic_version_file_enable_tools = ["java", "node", "pnpm", "rust"]
