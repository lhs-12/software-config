<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <rect width="100%" height="100%" fill="#ffffff" />
    <g fill="none" stroke="#000000" stroke-width="1.2" stroke-linecap="round">
        <!--
            圆心: cx = 200 ± dx, cy = 200 ± dy
            半径: r = sqrt(dx^2 + dy^2)
            其中 dx=12, dy=30
        -->
        <circle cx="212" cy="170" r="32.3" />
        <circle cx="188" cy="230" r="32.3" />
        <!--
            两段曲线: 贝塞尔 + 圆弧
            
            第一段: 贝塞尔曲线 M P0 C P1 P2 P3
            P0, P3: 两个圆的切点 (起点和终点)
              vx = cx1-cx2, vy = cy1-cy2
              offset = (vy, -vx) / 2
              6曲线: P0 = C2+offset, P3 = C1+offset
              9曲线: P0 = C1-offset, P3 = C2-offset
            P1, P2: 控制点, 计算方法:
              mid = (P0 + P3) / 2
              dir = (P3 - P0) / |P3 - P0|
              perp = (-dir.y, dir.x)
              P1 = P2 = mid + bulge * perp
            bulge = -0.6 (负数向外拱), 等效 r = 1833
            
            第二段: 圆弧 A r r 0 0 1 end, 其中 r = 400
        -->
        <path d="M 158 218 C 169.4 187.8, 169.4 187.8, 182 158 A 400 400 0 0 1 300 20" />
        <path d="M 242 182 C 230.6 212.2, 230.6 212.2, 218 242 A 400 400 0 0 1 100 380" />
    </g>
</svg>
