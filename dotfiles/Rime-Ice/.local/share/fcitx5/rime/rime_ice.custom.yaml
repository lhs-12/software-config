patch:
  translator/dictionary: private_dict # 自定义词典
  switches/@0/reset: 1 # 默认用英文
  switches/@1/reset: 1 # 默认用英文标点
  # 万象
  grammar:
    language: wanxiang-lts-zh-hans
    collocation_max_length: 8
    collocation_min_length: 3
    collocation_penalty: -10
    non_collocation_penalty: -5
    weak_collocation_penalty: -50
    rear_penalty: -5
  translator/contextual_suggestions: false
  translator/max_homophones: 8
  translator/max_homographs: 8