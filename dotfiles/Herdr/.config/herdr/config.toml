# herdr configuration
# Agents integration command: herdr integration install pi/omp/...
onboarding = false
[theme]
name = "terminal"
[terminal]
default_shell = "fish"
[ui]
prompt_new_tab_name = false
accent = "#7fbbb3"
toast.delivery = "herdr"
toast.delay_seconds = 1
[advanced]
scrollback_limit_bytes = 25000000
[experimental]
kitty_graphics = true
[keys]
prefix = "ctrl+a"
split_vertical = "prefix+|"
split_horizontal = "prefix+-"
new_tab = "prefix+t"
previous_tab = "prefix+["
next_tab = "prefix+]"
copy_mode = "prefix+e"
edit_scrollback = "prefix+shift+e"
[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
width = "95%"
height = "95%"
